name: CI

# Build + test on the toolchain Node (22 — pnpm 11 does not run on Node 20), then
# verify the *packed artifact* runs on Node 20. This is the honest guard for
# engines.node >=20: the build tools may need 22, but the shipped CLI must start on
# 20. If code ever depends on a Node 22-only runtime API, the smoke step fails.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # Pack the exact tarball npm would publish (no prepublishOnly on pack).
      - run: npm pack

      # Switch to Node 20 and confirm the shipped CLI installs and starts there.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Runtime smoke on Node 20
        run: |
          set -euo pipefail
          npm install -g ./openwolf-enhanced-*.tgz
          openwolf --version
          openwolf --help >/dev/null
