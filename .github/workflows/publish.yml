name: Publish to npm

# Tokenless publishing via npm Trusted Publishing (OIDC).
# No NPM_TOKEN secret: with `id-token: write` and a Trusted Publisher configured
# on npmjs.com for this repo + workflow, npm ≥ 11.5.1 mints a short-lived,
# workflow-scoped credential at publish time and attaches a provenance attestation.
#
# Trigger: push a version tag (v1.2.3), or run manually from the Actions tab.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC — this is what replaces the token
      contents: write   # create the GitHub Release for this tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # need tags so the prepublish guard can verify v<version> on HEAD

      # Explicit version installs pnpm standalone — WITHOUT corepack. If corepack is
      # enabled while packageManager points at pnpm, it shims `npm` too and every npm
      # call ("npm install -g npm", "npm publish") fails. Explicit version avoids that.
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: pnpm

      # Trusted publishing requires npm ≥ 11.5.1; node 22.14 ships npm 10. Pin to 11.x:
      # npm@latest is now 12.x, which requires node ≥ 22.22.2 and would EBADENGINE here.
      - run: npm install -g npm@11

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # prepublishOnly runs scripts/prepublish-guard.mjs; provenance is automatic under OIDC.
      - run: npm publish

      # Build the Claude Desktop Extension bundle (needs the fresh dist/ from `pnpm build` above).
      - run: pnpm build:mcpb

      # Publish a GitHub Release for this tag, notes from the CHANGELOG section, with the .mcpb attached.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="${TAG#v}"
          awk -v v="$ver" '
            $0 ~ ("^## \\[" v "\\]") { grab=1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > notes.md
          [ -s notes.md ] || printf 'Release %s\n' "$TAG" > notes.md
          gh release create "$TAG" dist-mcpb/openwolf.mcpb --title "$TAG" --notes-file notes.md --verify-tag
